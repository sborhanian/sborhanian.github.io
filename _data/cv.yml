# ── Open Source Projects ──────────────────────────────────────────────────────
# badge_secondary: true makes the badge grey instead of blue.
projects:
  - name:   "gwbench"
    title:  "Gravitational-Wave Detector & Network Benchmarking"
    badge:  "Lead Developer"
    dates:  "2019 – Present"
    bullets:
      - "Open-source Python package for Fisher-Matrix-based benchmarking of
         gravitational-wave detector networks."
      - "Adopted as a primary analysis tool by the Einstein Telescope and
         Cosmic Explorer collaborations."
      - "Highly modular and streamlined user experience for large-scale
         computational studies."
      - "Documented, packaged, and maintained for long-term community use;
         peer-reviewed publication."
    links:
      - label: "GitLab"
        url:   "https://gitlab.com/sborhanian/gwbench"
      - label: "Class. Quant. Grav. 38 (2021) — arXiv:2010.15202"
        url:   "https://arxiv.org/abs/2010.15202"

  - name:            "xkn"
    title:           "Kilonova Modeling Framework"
    badge:           "Core Developer"
    badge_secondary: true
    dates:           "2021 – 2023"
    bullets:
      - "Python package to generate kilonova light curves from binary neutron star mergers."
      - "<em>Key contributions:</em> Implementation of accessible user interface and
         optimization for computational efficiency."
      - "Documented, packaged, and maintained for long-term community use;
         peer-reviewed publication."
    links:
      - label: "GitHub"
        url:   "https://github.com/GiacomoRicigliano/xkn"
      - label: "MNRAS 529 (2024) 647-663 — arXiv:2311.15709"
        url:   "https://arxiv.org/abs/2311.15709"

