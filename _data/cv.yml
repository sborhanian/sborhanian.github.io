# ── About ─────────────────────────────────────────────────────────────────────
# Each paragraph may contain inline HTML (bold, em, etc.).
about:
  paragraphs:
    - "I'm an astrophysicist and scientific software developer with a decade of experience studying gravitational waves. The focus of my work lies on the development of open-source computational tools to investigate the science case for next-generation gravitational-wave detectors as well as to enable the analysis of data from current and future facilities. I have a strong commitment to develop easy-to-use, community-facing software that fosters reproducibility."
    - "In particular, I developed and maintain <strong>gwbench</strong>, a Python package that enables rapid benchmarking and forecasting of the science capabilities of gravitational-wave detectors through the Fisher-information formalism. It has been widely adopted in our research community and functions as one of the primary analysis tools for the Einstein Telescope and Cosmic Explorer collaborations."
    - "Besides, I am interested in developing efficient and accurate methods to detect and analyze gravitational-wave signals, particularly with an eye towards the challenges that next-generation detectors data will present. In this context, I am investigating the use of ML techniques through neural posterior estimation to accelerate the analysis of long-range, gravitational-wave signals to provide efficient early-warning alerts to the wider astronomy community and thereby facilitate multi-messenger observations of compact binary mergers."
    - "Recently, I have been studying and exploring Apple's programming ecosystem, revolving around Swift and SwiftUI. I am planning to release a couple of open-source iOS and macOS apps that I want for my day-to-day use and which I hope can be useful to other users as well."

