# ── Software  ──────────────────────────────────────────────────────
# badge_secondary: true makes the badge grey instead of blue.
software:
  - name:   "gwbench"
    title:  "Gravitational-Wave Detector & Network Benchmarking"
    badge:  "Lead Developer and Maintainer"
    dates:  "2019 – Present"
    text:  "I developed gwbench as an open-source, easy-to-use Python package to perform GW
            benchmarking for generic detector networks and waveform models in an efficient
            and scalable manner. The primary output of the code are estimates on expected
            signal-to-noise ratios and measurement errors, which are computed via the Fisher
            information formalism. The advantage of this formalism lies in the fast, analytic
            nature of the error estimation, thus
            making gwbench perfectly suitable for large-scale trade studies, while
            its assumption of loud signals means that the code is more applicable to future
            detector generations.  gwbench is a particularly powerful tool as it
            can account for Earth's rotation to improve
            the accuracy of the benchmarking results for long-lasting signals. It further
            provides access to the full catalog of waveforms in the LIGO Scientific
            Collaboration Algorithm Library elevating its relevance for a wide range of
            problems in GW astronomy such as waveform modeling, detector development,
            cosmology, and tests of GR."
    bullets:
      - "Open-source Python package"
      - "Highly modular and streamlined user experience"
      - "Used by large international collaborations as a primary analysis tool"
    links:
      - label: "GitLab"
        url:   "https://gitlab.com/sborhanian/gwbench"
      - label: "Class. Quant. Grav. 38 (2021) — arXiv:2010.15202"
        url:   "https://arxiv.org/abs/2010.15202"

  - name:            "xkn"
    title:           "Kilonova Modeling Framework"
    badge:           "Core Developer"
    badge_secondary: true
    dates:           "2021 – 2023"
    text:  "The XKN package was developed to provide a fast, flexible, semi-analytic framework to
            model kilonova lightcurves from the coalescence of two neutron stars, particularly
            with multi-messenger astronomy and analyses in mind. It computes bolometric 
            luminosities and broadband light curves to be directly compared to measurements
            from electromagnetic telescopes, e.g. for model parameter estimation through
            Bayesian inference. The kilonovae model employs a flexible, mutli-component ejecta
            description facilitating non-trivial ejecta structures and enabling straightforward
            implementation of diverse semi-analytic lightcurve models from the literature, in
            addition to the newly devloped, radiative-transfer calibrated <em>xkn-diff</em>
            model that shows improved agreement with numerical simulations of kilonovae." 
    bullets:
      - "Open-source Python package"
      - "Flexible multi-component kilonova model"
      - "<em>Key contributions:</em> User interface improvements and
        computational efficiency optimization"
    links:
      - label: "GitHub"
        url:   "https://github.com/GiacomoRicigliano/xkn"
      - label: "MNRAS 529 (2024) 647-663 — arXiv:2311.15709"
        url:   "https://arxiv.org/abs/2311.15709"

# ── Research  ──────────────────────────────────────────────────────
# badge_secondary: true makes the badge grey instead of blue.
research:
  - title:  "Towards the next generation of gravitational-wave detectors through large-scale trade studies"
    text: "Current generation gravitational-wave detectors, namely LIGO, Virgo, and KAGRA, have
           successfully ushered in the era of gravitational-wave astronomy. However, having been 
           conceptualized in the 1970s and biult in the 1990s, their limitations in sensitivity and 
           bandwidth will limit how many and which sources can be observed and at what fidelity. Therefore,
           the gravitational-wave community commenced the exploration, design, and development of 
           next-generation detectors which are envisioned to be an order of magnitude more sensitive.
           I have been involved in several investigations of the science case for these detectors,
           particularly through large-scale trade studies, that explored the impact of different detector
           designs, configurations, and also the placement on Earth. We were able to scrutinize various design
           choices for the Einstein Telescope and Cosmic Explorer, the two leading, next-generation detector
           proposals. These detectors would facilitate a dramatic increase in the number of 
           observable compact binary coalescences, from currently ~100 to ~100,000 per year, yield much
           louder detections with signal-to-noise ratios jumping an order of magnitude in acccordance with
           the sensitivity improvements, and provide such clean data with vastly improved measurement 
           quality: enabling precision cosmology and tests of general relativity and simply a deeper
           understanding of the astrophysical processes and origins governing these sources." 
    links:
      - label: "arXiv:2109.09882"
        url:   "https://arxiv.org/abs/2109.09882"
      - label: "arXiv:2202.11048"
        url:   "https://arxiv.org/abs/2202.11048"
      - label: "arXiv:2212.13183"
        url:   "https://arxiv.org/abs/2212.13183"
      - label: "arXiv:2301.08763"
        url:   "https://arxiv.org/abs/2301.08763"
      - label: "arXiv:2303.15923"
        url:   "https://arxiv.org/abs/2303.15923"
      - label: "arXiv:2306.13745"
        url:   "https://arxiv.org/abs/2306.13745"
      - label: "arXiv:2307.10421"
        url:   "https://arxiv.org/abs/2307.10421"
      - label: "arXiv:2503.12263"
        url:   "https://arxiv.org/abs/2503.12263"
      - label: "arXiv:2510.11861"
        url:   "https://arxiv.org/abs/2510.11861"

  - title: "Resolution of the Hubble-Lemaître tension with a single, golden Dark siren"
    text: "Besides tests of GR, GW observations of compact binary mergers also play a
           unique role for cosmology: They facilitate the
           measurement of the Hubble constant through a luminosity distance estimate in
           combination with an independent, EM redshift measurement from the GW source's
           host galaxy. In the light of the tension between the EM measurements of
           the Hubble constant from the early and late universe, the GW-assisted method
           has gained even more importance. While other studies investigated
           methods to resolve the Hubble-Lemaître tension with binary neutron stars, we
           demonstrated that there is an observable population of golden dark sirens that
           could facilitate this resolution in the next five years without direct EM
           counterparts or statistical methods. Instead, improved waveform models using
           higher spherical harmonic modes and planned upgrades to GW detectors will
           compound together to localize these golden events with high-precision, in
           distance and on the sky, to uniquely determine their host galaxies in the 
           local universe and consequently measure the Hubble constant to the required
           precision."
    links:
      - label: "Astrophys. J. Lett., 905, L28 (2020) — arXiv:2007.02883"
        url:   "https://arxiv.org/abs/2007.02883"
      - label: "Publicity | AAS Nova"
        url: "https://aasnova.org/2021/02/24/the-call-of-dark-sirens-in-precision-cosmology/"
      - label: "Publicity | Live Science"
        url: "https://www.livescience.com/dark-sirens-resolve-hubble-tension.html"
      - label: "Publicity | Vice"
        url: "https://www.vice.com/en/article/dark-sirens-in-space-can-solve-a-huge-mystery-in-spacetime-scientists-propose/"

  - title:  "Connection of the post-Newtonian and strong-field regimes"
    text: "The connection of the inspiraling progenitor system and the ringing remnant
           black hole is one of the open problems of BBH merger modeling. Following
           previous studies we examined the amplitudes of the GWs
           emitted during BBH mergers from the late inspiral to the early
           ringdown and modeled the imprint of the progenitor system throughout the
           strong-field regime. In doing so, we compared the analytical predictions
           of post-Newtonian (PN) theory to the data provided by numerical relativity
           simulations of the SXS BBH catalog. We found a remarkable agreement of the
           dominant spherical harmonic mode amplitudes with the functional dependence
           on progenitor parameters as described in PN theory. This PN signature was
           not expected and indicates a potential for waveform model development in
           the strong-field regime. Further such models can be useful to develop
           no-hair tests of the merger remnant's black hole nature."
    links:
      - label: "Class. Quant. Grav., 37, 065006 (2020) — arXiv:1901.08516"
        url:   "https://arxiv.org/abs/1901.08516"

