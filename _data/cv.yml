# ── About ─────────────────────────────────────────────────────────────────────
# Each paragraph may contain inline HTML (bold, em, etc.).
about:
  paragraphs:
    - "I am a physicist and open-source software developer working at the intersection
       of gravitational-wave science and scientific computing. With nearly a decade of
       academic research experience and a deep commitment to reproducible,
       community-facing software, I build tools that enable large-scale science."
    - "My flagship project, <strong>gwbench</strong>, has been adopted as a primary
       analysis tool by the Einstein Telescope and Cosmic Explorer collaborations.
       I am an active member of the gravitational-wave community, with
       <strong>24 peer-reviewed publications</strong> and over
       <strong>2,900 citations</strong>."
    - "I thrive in collaborative environments, communicate technical ideas fluently
       across disciplines, and adapt quickly to new tools and challenges."

